<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#175E63">
<title>City Walks</title>

<!-- ============================================================
     CITY WALKS · Trieste & Rhodos · Dansk / English
     Selvguidede gåture med kort, GPS og lydguide i én HTML-fil.
     Byvalget huskes i localStorage; fremdrift gemmes pr. by.
     ============================================================ -->

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&display=swap">

<style>
:root{
  --sea:#175E63; --sea-deep:#0E3F44;
  --stone:#F5EFE4; --card:#FFFFFF;
  --ink:#22303A; --ink-soft:#5B6B75;
  --terra:#C0603A; --ochre:#C2953C;
  --line:#E4DCCB; --ok:#2E7D5B;
  --radius:18px; --shadow:0 4px 16px rgba(20,50,60,.10); --nav-h:66px;
}
@media (prefers-color-scheme: dark){
  :root{
    --sea:#3FA8AE; --sea-deep:#8FD6DA;
    --stone:#101A20; --card:#1A262E;
    --ink:#ECF1F2; --ink-soft:#9AAAB2;
    --terra:#E08A63; --ochre:#D9B25F;
    --line:#2C3A43; --shadow:0 4px 16px rgba(0,0,0,.35);
  }
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0; padding:0; height:100%; overflow-x:hidden;}
body{
  font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background:var(--stone); color:var(--ink); font-size:17px; line-height:1.55;
  padding-bottom:calc(var(--nav-h) + env(safe-area-inset-bottom));
}
h1,h2,h3,.display{font-family:"Fraunces", Georgia, serif;}

header{
  position:sticky; top:0; z-index:900; background:var(--sea); color:#fff;
  padding:calc(10px + env(safe-area-inset-top)) 16px 12px;
  box-shadow:0 2px 10px rgba(0,0,0,.18);
}
@media (prefers-color-scheme: dark){ header{background:#153A40; color:#ECF1F2;} }
header .row{display:flex; justify-content:space-between; align-items:baseline; gap:10px;}
header h1{margin:0; font-size:1.15rem; font-weight:700; letter-spacing:.02em;}
header .sub{font-size:.85rem; opacity:.85;}
.progress-wrap{margin-top:8px;}
.progress-bar{height:8px; background:rgba(255,255,255,.25); border-radius:99px; overflow:hidden;}
.progress-fill{height:100%; width:0%; background:var(--ochre); border-radius:99px; transition:width .4s ease;}
.progress-meta{display:flex; justify-content:space-between; font-size:.8rem; margin-top:5px; opacity:.92;}

.view{display:none; animation:fadein .25s ease;}
.view.active{display:block;}
@keyframes fadein{from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:none;}}
.pad{padding:16px;}

#mapWrap{position:relative;}
#map{height:60dvh; min-height:300px; z-index:1; background:#CFE3E1;} /* præcis højde sættes i JS (sizeMap) */
.map-fallback{display:flex; align-items:center; justify-content:center; text-align:center;
  height:340px; padding:24px; color:var(--ink-soft);}
.map-buttons{position:absolute; left:0; right:0; bottom:12px; z-index:500; display:flex; gap:10px; padding:0 12px;}
.map-buttons button{flex:1;}
.map-info{
  position:absolute; top:10px; left:50%; transform:translateX(-50%); z-index:500;
  background:var(--card); color:var(--ink); border:1px solid var(--line);
  border-radius:99px; padding:7px 16px; font-size:.85rem; box-shadow:var(--shadow);
  white-space:nowrap; max-width:92%; overflow:hidden; text-overflow:ellipsis;
}
#compass{
  position:absolute; top:54px; right:12px; z-index:500; width:46px; height:46px; border-radius:50%;
  background:var(--card); border:1px solid var(--line); box-shadow:var(--shadow);
  display:none; align-items:center; justify-content:center;
}
#compassNeedle{font-size:1.3rem; transition:transform .2s ease; display:block;}
.stop-marker{
  background:var(--sea); color:#fff; border:2px solid #fff;
  width:32px; height:32px; border-radius:50% 50% 50% 4px;
  display:flex; align-items:center; justify-content:center;
  font-weight:700; font-size:.95rem; box-shadow:0 2px 6px rgba(0,0,0,.35); transform:rotate(-45deg);
}
.stop-marker span{transform:rotate(45deg);}
.stop-marker.done{background:var(--ok);}
.stop-marker.here{background:var(--terra);}
.leaflet-popup-content{font-size:1rem;}
.leaflet-popup-content button{margin-top:8px; width:100%;}

button{
  font:inherit; border:none; cursor:pointer; border-radius:14px; padding:14px 18px;
  font-size:1rem; font-weight:600; background:var(--card); color:var(--ink);
  box-shadow:var(--shadow); border:1px solid var(--line); min-height:50px;
}
button:active{transform:scale(.985);}
.btn-primary{background:var(--sea); color:#fff; border:none;}
.btn-terra{background:var(--terra); color:#fff; border:none;}
.btn-ghost{background:transparent; box-shadow:none;}
.btn-row{display:flex; gap:10px; flex-wrap:wrap; margin-top:12px;}
.btn-row button{flex:1; min-width:120px;}
button:disabled{opacity:.45;}
.pulse{animation:pulse 1.4s ease infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(192,96,58,.55);} 50%{box-shadow:0 0 0 12px rgba(192,96,58,0);}}
.seg{display:flex; gap:8px;}
.seg button{flex:1;}
.seg button.on{background:var(--sea); color:#fff; border:none;}

.card{
  background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
  box-shadow:var(--shadow); padding:18px; margin-bottom:16px;
}
.stop-head{display:flex; align-items:center; gap:12px;}
.stop-num{
  flex:none; width:44px; height:44px; border-radius:50%; background:var(--sea); color:#fff;
  display:flex; align-items:center; justify-content:center;
  font-family:"Fraunces", Georgia, serif; font-size:1.25rem; font-weight:700;
}
.stop-num.done{background:var(--ok);}
.stop-title{margin:0; font-size:1.3rem; line-height:1.25;}
.badges{display:flex; gap:8px; flex-wrap:wrap; margin-top:10px;}
.badge{font-size:.78rem; font-weight:700; padding:4px 12px; border-radius:99px;}
.badge.dist{background:color-mix(in srgb, var(--sea) 12%, transparent); color:var(--sea);}
.badge.arrived{background:color-mix(in srgb, var(--ochre) 22%, transparent); color:var(--ochre);}
.badge.done{background:color-mix(in srgb, var(--ok) 15%, transparent); color:var(--ok);}
.badge.skipped{background:color-mix(in srgb, var(--ink-soft) 18%, transparent); color:var(--ink-soft);}
.badge.speaking{background:color-mix(in srgb, var(--terra) 18%, transparent); color:var(--terra);}
.intro{color:var(--ink-soft); margin:10px 0 0;}
.story{margin-top:12px;}
.story p{margin:0 0 10px;}
.lookfor{margin:12px 0 0; padding:12px 14px; border-radius:12px;
  background:color-mix(in srgb, var(--ochre) 10%, transparent);
  border:1px dashed color-mix(in srgb, var(--ochre) 55%, transparent);}
.lookfor h3{margin:0 0 6px; font-size:1rem;}
.lookfor ul{margin:0; padding-left:20px;}
.lookfor li{margin-bottom:4px;}
details.story-box{margin-top:12px;}
details.story-box summary{font-weight:700; cursor:pointer; color:var(--sea); padding:6px 0;}

.stop-row{display:flex; align-items:center; gap:12px; width:100%; text-align:left; padding:14px; margin-bottom:10px;}
.stop-row .grow{flex:1; min-width:0;}
.stop-row .name{font-weight:700;}
.stop-row .meta{font-size:.82rem; color:var(--ink-soft);}
.stop-row .chev{color:var(--ink-soft);}

.setting{margin-bottom:20px;}
.setting label{display:block; font-weight:700; margin-bottom:6px;}
input[type=range]{width:100%; accent-color:var(--sea); height:34px;}
.hint{font-size:.85rem; color:var(--ink-soft); margin-top:4px;}

nav{
  position:fixed; left:0; right:0; bottom:0; z-index:1000; display:flex;
  background:var(--card); border-top:1px solid var(--line);
  padding-bottom:env(safe-area-inset-bottom); box-shadow:0 -2px 12px rgba(0,0,0,.08);
}
nav button{
  flex:1; background:none; border:none; box-shadow:none; border-radius:0;
  display:flex; flex-direction:column; align-items:center; gap:2px;
  padding:9px 4px 7px; font-size:.72rem; font-weight:600; color:var(--ink-soft); min-height:var(--nav-h);
}
nav button .ico{font-size:1.35rem; line-height:1;}
nav button.active{color:var(--sea);}

#toast{
  position:fixed; left:50%; bottom:calc(var(--nav-h) + 18px + env(safe-area-inset-bottom));
  transform:translateX(-50%) translateY(20px);
  background:var(--sea-deep); color:#fff; padding:12px 20px; border-radius:14px;
  font-size:.95rem; box-shadow:var(--shadow); opacity:0; pointer-events:none;
  transition:all .3s ease; z-index:1100; max-width:88%; text-align:center;
}
@media (prefers-color-scheme: dark){ #toast{background:#245A60;} }
#toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

/* Byvælger-overlay ved første åbning */
#tourPicker{
  display:none; position:fixed; inset:0; z-index:2000; background:var(--stone);
  padding:calc(30px + env(safe-area-inset-top)) 20px 30px; overflow:auto;
}
#tourPicker h1{margin:0 0 4px; font-size:2rem;}
#tourPicker .sub{color:var(--ink-soft); margin:0 0 22px;}
.tour-card{width:100%; text-align:left; display:flex; align-items:center; gap:16px; padding:20px; margin-bottom:14px;}
.tour-card .flag{font-size:2.2rem;}
.tour-card .tname{font-family:"Fraunces", Georgia, serif; font-size:1.35rem; font-weight:700;}
.tour-card .tmeta{font-size:.85rem; color:var(--ink-soft); margin-top:2px;}

@media (prefers-reduced-motion: reduce){ *{animation:none !important; transition:none !important;} }
</style>
</head>
<body>

<!-- ============ BYVÆLGER (første åbning) ============ -->
<div id="tourPicker">
  <h1 class="display">City Walks</h1>
  <p class="sub">Vælg din by · Choose your city</p>
  <button class="card tour-card" onclick="chooseTour('trieste')">
    <span class="flag">🇮🇹</span>
    <span><span class="tname">Trieste</span><br>
    <span class="tmeta">10 stop · ca. 3,5 km · 2–3 timer / hours</span></span>
  </button>
  <button class="card tour-card" onclick="chooseTour('rhodos')">
    <span class="flag">🇬🇷</span>
    <span><span class="tname">Rhodos · Rhodes</span><br>
    <span class="tmeta">10 stop · ca. 2,5 km · 2–3 timer / hours</span></span>
  </button>
  <button class="card tour-card" onclick="chooseTour('koege')">
    <span class="flag">🇩🇰</span>
    <span><span class="tname">Køge</span><br>
    <span class="tmeta">8 stop · ca. 2 km · 1,5–2,5 timer / hours</span></span>
  </button>
  <p class="hint">Valget huskes – det kan altid ændres under Indstillinger.<br>
  Your choice is remembered – change it anytime in Settings.</p>
</div>

<header>
  <div class="row">
    <h1 id="appTitle">City Walk</h1>
    <span class="sub" id="hdrRemaining">–</span>
  </div>
  <div class="row" style="margin-top:2px;">
    <span class="sub" id="hdrCurrent">–</span>
    <span class="sub" id="hdrNext">–</span>
  </div>
  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-meta">
      <span id="hdrDone"></span>
      <span id="hdrPct">0 %</span>
    </div>
  </div>
</header>

<section id="view-map" class="view active">
  <div id="mapWrap">
    <div id="map"></div>
    <div class="map-info" id="mapInfo">…</div>
    <div id="compass" aria-hidden="true"><span id="compassNeedle">🧭</span></div>
    <div class="map-buttons">
      <button class="btn-primary" id="btnMyPos"></button>
      <button class="btn-terra" id="btnNextStop"></button>
    </div>
  </div>
  <div class="pad" id="gpsNoteWrap"><div class="card" id="gpsNote"></div></div>
</section>

<section id="view-current" class="view">
  <div class="pad" id="currentStopContainer"></div>
</section>

<section id="view-all" class="view">
  <div class="pad">
    <h2 class="display" id="allTitle" style="margin:4px 0 4px;"></h2>
    <p class="hint" id="routeSummary" style="margin:0 0 14px;"></p>
    <div id="allStopsContainer"></div>
    <button class="btn-ghost" id="btnReset" style="width:100%; color:var(--terra); margin-top:8px;"></button>
  </div>
</section>

<section id="view-settings" class="view">
  <div class="pad">
    <h2 class="display" id="settingsTitle" style="margin:4px 0 16px;"></h2>

    <div class="card">
      <div class="setting" style="margin-bottom:14px;">
        <label id="lblCity">By / City</label>
        <div class="seg">
          <button id="tourTrieste" onclick="setTour('trieste')">🇮🇹 Trieste</button>
          <button id="tourRhodos" onclick="setTour('rhodos')">🇬🇷 Rhodos</button>
          <button id="tourKoege" onclick="setTour('koege')">🇩🇰 Køge</button>
        </div>
      </div>
      <div class="setting" style="margin-bottom:6px;">
        <label id="lblLang"></label>
        <div class="seg">
          <button id="langDa" onclick="setLang('da')">🇩🇰 Dansk</button>
          <button id="langEn" onclick="setLang('en')">🇬🇧 English</button>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="setting">
        <label for="rate"><span id="lblRate"></span> <span id="rateVal">1,0×</span></label>
        <input type="range" id="rate" min="0.6" max="1.4" step="0.1" value="1">
      </div>
      <div class="setting">
        <label for="volume"><span id="lblVolume"></span> <span id="volVal">100 %</span></label>
        <input type="range" id="volume" min="0" max="1" step="0.1" value="1">
      </div>
      <div class="setting" style="margin-bottom:6px;">
        <label id="lblVoice"></label>
        <div class="hint" id="voiceInfo">…</div>
      </div>
    </div>

    <div class="card">
      <div class="setting" style="margin-bottom:6px;">
        <label id="lblGps"></label>
        <div class="hint" id="gpsInfo">…</div>
      </div>
      <button id="btnCompassPerm" style="width:100%; margin-top:8px;"></button>
      <div class="hint" id="compassHint" style="margin-top:6px;"></div>
    </div>

    <div class="card">
      <div class="setting" style="margin-bottom:6px;">
        <label id="lblOffline"></label>
        <div class="hint" id="offlineInfo"></div>
      </div>
      <button id="btnOffline" class="btn-primary" style="width:100%; margin-top:8px;"></button>
      <button id="btnRefreshTiles" style="width:100%; margin-top:8px;"></button>
    </div>

    <div class="card">
      <strong id="aboutTitle"></strong>
      <p class="hint" id="aboutText" style="margin:8px 0 0;"></p>
    </div>

    <button class="btn-ghost" id="btnResetApp" style="width:100%; color:var(--terra);"></button>
  </div>
</section>

<nav>
  <button data-view="view-map" class="active"><span class="ico">🗺️</span><span id="navMap"></span></button>
  <button data-view="view-current"><span class="ico">📍</span><span id="navCurrent"></span></button>
  <button data-view="view-all"><span class="ico">🚶</span><span id="navAll"></span></button>
  <button data-view="view-settings"><span class="ico">⚙️</span><span id="navSettings"></span></button>
</nav>

<div id="toast" role="status"></div>
