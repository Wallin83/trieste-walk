/* ============================================================
   3) TILSTAND + LOCALSTORAGE (fremdrift pr. by)
   ============================================================ */
const LS_KEY="city-walks-v2";
const LS_KEY_OLD="trieste-city-walk-v1";
let state={ lang:"da", rate:1.0, volume:1.0, tour:null, tours:{} };
let pendingChoice=false;

function defaultProg(){ return {current:0, completed:[], skipped:[], arrivedNotified:[], offlineReady:false}; }
function ensureProg(id){ if(!state.tours[id]) state.tours[id]=defaultProg(); return state.tours[id]; }
function prog(){ return ensureProg(state.tour); }

function loadState(){
  try{
    const raw=localStorage.getItem(LS_KEY);
    if(raw){ state=Object.assign(state,JSON.parse(raw)); return; }
    // Migrér fra den gamle Trieste-version, så en igangværende tur ikke mistes
    const old=localStorage.getItem(LS_KEY_OLD);
    if(old){
      const o=JSON.parse(old);
      state.lang=o.lang||"da"; state.rate=o.rate||1; state.volume=(o.volume==null?1:o.volume);
      state.tour="trieste";
      state.tours.trieste={current:o.current||0, completed:o.completed||[], skipped:o.skipped||[],
        arrivedNotified:o.arrivedNotified||[], offlineReady:!!o.offlineReady};
      saveState();
    }
  }catch(e){}
}
function saveState(){ try{ localStorage.setItem(LS_KEY, JSON.stringify(state)); }catch(e){} }

/* ============================================================
   4) HJÆLPEFUNKTIONER
   ============================================================ */
let STOPS=[];
function distMeters(lat1,lng1,lat2,lng2){
  const R=6371000, rad=Math.PI/180;
  const dLat=(lat2-lat1)*rad, dLng=(lng2-lng1)*rad;
  const a=Math.sin(dLat/2)**2 + Math.cos(lat1*rad)*Math.cos(lat2*rad)*Math.sin(dLng/2)**2;
  return 2*R*Math.asin(Math.sqrt(a));
}
function fmtDist(m){
  if(m==null) return "–";
  const dec=state.lang==="da"?",":".";
  return m<1000 ? Math.round(m)+" m" : (m/1000).toFixed(1).replace(".",dec)+" km";
}
function toast(msg){
  const el=document.getElementById("toast");
  el.textContent=msg; el.classList.add("show");
  clearTimeout(el._tm); el._tm=setTimeout(()=>el.classList.remove("show"),3200);
}
function isDone(id){ return prog().completed.includes(id); }
function isSkipped(id){ return prog().skipped.includes(id); }
function nextOpenStop(){ return STOPS.find(s=>!isDone(s.id)&&!isSkipped(s.id))||null; }
const L8=(obj)=>obj[state.lang]||obj.da;

/* ============================================================
   5) KORT
   ============================================================ */
let map=null, userMarker=null, accCircle=null, stopMarkers=[], routeLayer=null;
let userPos=null, userAcc=null;

function initMap(){
  const el=document.getElementById("map");
  if(typeof L==="undefined"){ el.outerHTML='<div class="map-fallback">'+t("mapFail")+'</div>'; return; }
  try{
    const tour=TOURS[state.tour];
    map=L.map("map",{zoomControl:true}).setView(tour.center,tour.zoom);
    const osm=L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png",{maxZoom:19,attribution:"© OpenStreetMap"}).addTo(map);
    const sat=L.tileLayer("https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",{maxZoom:19,attribution:"© Esri World Imagery"});
    L.control.layers({[t("layerMap")]:osm,[t("layerSat")]:sat},null,{position:"topleft"}).addTo(map);
    routeLayer=L.layerGroup().addTo(map);
    buildTourLayers();
  }catch(e){
    el.outerHTML='<div class="map-fallback">'+t("mapFail")+'</div>'; map=null;
  }
}
// (Gen)opbygger rute og markører for den valgte by
function buildTourLayers(){
  if(!map||!routeLayer) return;
  routeLayer.clearLayers(); stopMarkers=[];
  L.polyline(STOPS.map(s=>[s.lat,s.lng]),{color:"#C0603A",weight:4,opacity:.85,dashArray:"2 8",lineCap:"round"}).addTo(routeLayer);
  STOPS.forEach(s=>{
    const icon=L.divIcon({className:"",iconSize:[32,32],iconAnchor:[16,30],
      html:`<div class="stop-marker" id="marker-${s.id}"><span>${s.id+1}</span></div>`});
    const m=L.marker([s.lat,s.lng],{icon}).addTo(routeLayer);
    stopMarkers.push(m);
  });
  const tour=TOURS[state.tour];
  map.setView(tour.center,tour.zoom);
  refreshMarkers(); refreshPopups();
}
function refreshMarkers(){
  STOPS.forEach(s=>{
    const el=document.getElementById("marker-"+s.id);
    if(!el) return;
    el.classList.toggle("done",isDone(s.id));
    el.classList.toggle("here",s.id===prog().current&&!isDone(s.id));
  });
}
function refreshPopups(){
  stopMarkers.forEach((m,i)=>{
    const s=STOPS[i];
    m.bindPopup(`<strong>${s.id+1}. ${L8(s.name)}</strong><br>
      <button class="btn-primary" onclick="openStopFromMap(${s.id})">${t("openStop")}</button>`);
  });
}
function openStopFromMap(id){
  prog().current=id; saveState();
  if(map) map.closePopup();
  showView("view-current"); renderAll();
}

/* ============================================================
   6) GEOLOKATION
   ============================================================ */
let lastGpsKey="gpsWait", lastGpsVars={};
function setGpsTexts(key,vars){
  lastGpsKey=key; lastGpsVars=vars||{};
  document.getElementById("gpsInfo").textContent=tf(key,vars)+(key==="gpsDenied"||key==="gpsUnavail"||key==="gpsTimeout"?t("gpsHttps"):"");
}
function startGeolocation(){
  if(!("geolocation" in navigator)){
    document.getElementById("mapInfo").textContent=t("gpsNoSupport");
    setGpsTexts("gpsNoSupport"); return;
  }
  navigator.geolocation.watchPosition(pos=>{
    userPos={lat:pos.coords.latitude,lng:pos.coords.longitude};
    userAcc=pos.coords.accuracy;
    document.getElementById("gpsNoteWrap").style.display="none";
    setGpsTexts("gpsOk",{a:Math.round(userAcc)});
    updateUserOnMap(); updateDistances(); checkProximity();
  }, err=>{
    const key={1:"gpsDenied",2:"gpsUnavail",3:"gpsTimeout"}[err.code]||"gpsUnavail";
    document.getElementById("mapInfo").textContent=t(key);
    setGpsTexts(key);
  },{enableHighAccuracy:true,maximumAge:5000,timeout:15000});
}
function updateUserOnMap(){
  if(!map||!userPos) return;
  if(!userMarker){
    userMarker=L.circleMarker([userPos.lat,userPos.lng],{radius:9,color:"#fff",weight:3,fillColor:"#1B7FD4",fillOpacity:1})
      .addTo(map).bindPopup(t("youAreHere"));
  }else{ userMarker.setLatLng([userPos.lat,userPos.lng]); }
  if(userAcc!=null){
    if(!accCircle){
      accCircle=L.circle([userPos.lat,userPos.lng],{radius:userAcc,color:"#1B7FD4",weight:1,fillColor:"#1B7FD4",fillOpacity:.12}).addTo(map);
    }else{ accCircle.setLatLng([userPos.lat,userPos.lng]); accCircle.setRadius(userAcc); }
  }
}
const ARRIVE_RADIUS=50;
function checkProximity(){
  if(!userPos) return;
  STOPS.forEach(s=>{
    if(isDone(s.id)||prog().arrivedNotified.includes(s.id)) return;
    if(distMeters(userPos.lat,userPos.lng,s.lat,s.lng)<=ARRIVE_RADIUS){
      prog().arrivedNotified.push(s.id); saveState();
      toast(tf("arrivedToast",{n:s.id+1,name:L8(s.name)}));
      renderAll();
    }
  });
}

/* ============================================================
   7) LYD – Web Speech API
   Sætning-for-sætning med naturlige pauser, spolbar afspilning
   og pause via stop+husk-sætning (iOS-venligt).
   ============================================================ */
let activeVoice=null, speakingStop=null, isPaused=false;
let speechQueue=[], speechIdx=0, gapTimer=null, inGap=false;
let speechGen=0;
let storyOpen=false, lastStoryKey="", seekDragging=false;

function pickVoice(){
  if(!("speechSynthesis" in window)){
    document.getElementById("voiceInfo").textContent=t("noSpeechSetting"); return;
  }
  const voices=speechSynthesis.getVoices();
  const cand=voices.filter(v=>v.lang&&v.lang.toLowerCase().startsWith(state.lang));
  activeVoice=cand.find(v=>/enhanced|premium|forbedret|natural|siri/i.test(v.name))||cand[0]||null;
  const info=document.getElementById("voiceInfo");
  if(activeVoice){
    const nice=/enhanced|premium|forbedret|natural|siri/i.test(activeVoice.name);
    info.textContent=tf("voiceFound",{name:activeVoice.name})+(nice?"":t("voiceTip"));
  }else if(voices.length){
    info.textContent=t("noVoice")+t("voiceTip");
  }
}
if("speechSynthesis" in window){ speechSynthesis.onvoiceschanged=pickVoice; }

function buildSpeechQueue(story){
  const q=[];
  story.split(/\n+/).forEach(par=>{
    const parts=(par.match(/[^.!?]+[.!?]+\s*|[^.!?]+$/g)||[par]).map(p=>p.trim()).filter(p=>p.length);
    parts.forEach((p,i)=>q.push({text:p,gap:i===parts.length-1?750:260}));
  });
  return q;
}
function speakNext(){
  if(speakingStop===null||speechIdx>=speechQueue.length){
    speakingStop=null; inGap=false; renderAll(); return;
  }
  inGap=false;
  const gen=speechGen;
  const item=speechQueue[speechIdx++];
  const u=new SpeechSynthesisUtterance(item.text);
  u.lang=state.lang==="da"?"da-DK":"en-GB";
  if(activeVoice) u.voice=activeVoice;
  u.rate=state.rate; u.volume=state.volume;
  let finished=false;
  const finish=()=>{
    if(finished||gen!==speechGen||speakingStop===null||isPaused) return;
    finished=true; inGap=true;
    gapTimer=setTimeout(()=>{ if(gen===speechGen&&!isPaused) speakNext(); }, item.gap/state.rate);
  };
  u.onend=finish; u.onerror=finish;
  speechSynthesis.speak(u);
  updateSeekUI();
}
function playStop(id){
  if(!("speechSynthesis" in window)){ toast(t("noSpeech")); return; }
  stopSpeech();
  speakingStop=id; isPaused=false; speechIdx=0;
  storyOpen=true;
  speechQueue=buildSpeechQueue(L8(STOPS[id].story));
  speakNext(); renderAll();
}
function pauseSpeech(){
  if(!("speechSynthesis" in window)||speakingStop===null) return;
  if(!isPaused){
    isPaused=true; speechGen++;
    clearTimeout(gapTimer);
    if(!inGap&&speechIdx>0) speechIdx--;
    try{ speechSynthesis.cancel(); }catch(e){}
  }else{
    isPaused=false; speakNext();
  }
  renderAll();
}
function stopSpeech(){
  speechGen++;
  clearTimeout(gapTimer);
  if("speechSynthesis" in window){ try{ speechSynthesis.cancel(); }catch(e){} }
  speakingStop=null; isPaused=false; inGap=false; speechQueue=[]; speechIdx=0;
  renderAll();
}
function updateSeekUI(){
  if(seekDragging) return;
  const sEl=document.getElementById("seek");
  if(!sEl) return;
  sEl.max=Math.max(0,speechQueue.length-1);
  sEl.value=Math.max(0,speechIdx-1);
  const pEl=document.getElementById("seekPct");
  if(pEl) pEl.textContent=Math.round(speechIdx/Math.max(1,speechQueue.length)*100)+" %";
}
function seekPreview(v){
  seekDragging=true;
  const pEl=document.getElementById("seekPct");
  if(pEl) pEl.textContent=Math.round((parseInt(v,10)+1)/Math.max(1,speechQueue.length)*100)+" %";
}
function seekTo(v){
  seekDragging=false;
  if(speakingStop===null) return;
  speechGen++;
  clearTimeout(gapTimer); inGap=false;
  try{ speechSynthesis.cancel(); }catch(e){}
  speechIdx=Math.max(0,Math.min(speechQueue.length-1,parseInt(v,10)||0));
  if(!isPaused) speakNext(); else updateSeekUI();
}

/* ============================================================
   8) SPROG- OG BYSKIFT
   ============================================================ */
function setLang(lang){
  if(state.lang===lang) return;
  stopSpeech();
  state.lang=lang; saveState();
  pickVoice(); applyLanguage(); renderAll();
}
function loadTour(){
  STOPS=TOURS[state.tour].stops;
  buildTourLayers();
}
function setTour(id){
  if(state.tour===id&&!pendingChoice) return;
  stopSpeech();
  state.tour=id; ensureProg(id); pendingChoice=false; saveState();
  loadTour(); applyLanguage(); renderAll();
  toast(tf("tourSwitched",{name:L8(TOURS[id].cityName)}));
}
function chooseTour(id){
  state.tour=id; ensureProg(id); pendingChoice=false; saveState();
  document.getElementById("tourPicker").style.display="none";
  loadTour(); applyLanguage(); renderAll(); sizeMap();
}
function applyLanguage(){
  document.documentElement.lang=state.lang;
  const tour=TOURS[state.tour];
  const set=(id,key)=>{ const el=document.getElementById(id); if(el) el.textContent=t(key); };
  document.getElementById("appTitle").textContent=L8(tour.title);
  document.title=L8(tour.title);
  set("navMap","navMap"); set("navCurrent","navCurrent"); set("navAll","navAll"); set("navSettings","navSettings");
  set("btnMyPos","btnMyPos"); set("btnNextStop","btnNextStop");
  set("allTitle","allTitle"); set("btnReset","reset");
  set("settingsTitle","settingsTitle"); set("lblLang","lblLang");
  set("lblRate","lblRate"); set("lblVolume","lblVolume"); set("lblVoice","lblVoice");
  set("lblGps","lblGps"); set("btnCompassPerm","btnCompass"); set("compassHint","compassHint");
  set("lblOffline","lblOffline"); set("btnOffline","btnOffline");
  set("btnRefreshTiles","btnRefreshTiles");
  set("btnResetApp","resetApp");
  document.getElementById("aboutTitle").textContent=t("aboutTitle");
  document.getElementById("aboutText").textContent=L8(tour.about);
  document.getElementById("gpsNote").innerHTML=t("gpsNote");
  document.getElementById("routeSummary").textContent=L8(tour.summary);
  document.getElementById("offlineInfo").textContent=t("offlineHint")+(prog().offlineReady?" "+t("offlineDone"):"");
  document.getElementById("langDa").classList.toggle("on",state.lang==="da");
  document.getElementById("langEn").classList.toggle("on",state.lang==="en");
  document.getElementById("tourTrieste").classList.toggle("on",state.tour==="trieste");
  document.getElementById("tourRhodos").classList.toggle("on",state.tour==="rhodos");
  document.getElementById("tourKoege").classList.toggle("on",state.tour==="koege");
  setGpsTexts(lastGpsKey,lastGpsVars);
  if(userMarker) userMarker.bindPopup(t("youAreHere"));
  refreshPopups();
  updateDistances();
}

/* ============================================================
   9) NAVIGATION MELLEM STOP
   ============================================================ */
function markDone(id){
  const p=prog();
  if(!isDone(id)) p.completed.push(id);
  p.skipped=p.skipped.filter(x=>x!==id);
  stopSpeech();
  const nxt=nextOpenStop();
  if(nxt){ p.current=nxt.id; toast(tf("doneToast",{name:L8(nxt.name)})); }
  else{ toast(t("allDoneToast")); }
  saveState(); renderAll();
}
function skipStop(id){
  const p=prog();
  if(!isSkipped(id)) p.skipped.push(id);
  stopSpeech();
  const nxt=nextOpenStop();
  if(nxt) p.current=nxt.id;
  toast(t("skipToast"));
  saveState(); renderAll();
}
function gotoStop(id){
  prog().current=Math.max(0,Math.min(STOPS.length-1,id));
  saveState(); renderAll();
}
function resetTour(){
  if(!confirm(t("resetConfirm"))) return;
  stopSpeech();
  state.tours[state.tour]=defaultProg();
  saveState(); renderAll(); toast(t("resetDone"));
}
// Fuld nulstilling: sletter alt gemt og genstarter appen med byvælgeren
function resetApp(){
  if(!confirm(t("resetAppConfirm"))) return;
  stopSpeech();
  try{ localStorage.removeItem(LS_KEY); localStorage.removeItem(LS_KEY_OLD); }catch(e){}
  location.reload();
}

/* ============================================================
   10) RENDERING
   ============================================================ */
function storyToParagraphs(txt){ return txt.split(/\n+/).map(p=>`<p>${p.trim()}</p>`).join(""); }
function mapsLinks(s){
  const apple=`https://maps.apple.com/?daddr=${s.lat},${s.lng}&dirflg=w`;
  const google=`https://www.google.com/maps/dir/?api=1&destination=${s.lat},${s.lng}&travelmode=walking`;
  return `<div class="btn-row">
    <button onclick="window.open('${apple}','_blank')">${t("openApple")}</button>
    <button onclick="window.open('${google}','_blank')">${t("openGoogle")}</button>
  </div>`;
}
function renderCurrentStop(){
  const s=STOPS[prog().current];
  const storyKey=state.tour+"-"+s.id;
  if(lastStoryKey!==storyKey){ storyOpen=false; lastStoryKey=storyKey; }
  const done=isDone(s.id), arrived=prog().arrivedNotified.includes(s.id);
  const speaking=speakingStop===s.id;
  const d=userPos?distMeters(userPos.lat,userPos.lng,s.lat,s.lng):null;
  const badges=[
    d!=null?`<span class="badge dist">${tf("fromHere",{d:fmtDist(d)})}</span>`:"",
    arrived&&!done?`<span class="badge arrived">${t("arrived")}</span>`:"",
    done?`<span class="badge done">${t("completed")}</span>`:"",
    isSkipped(s.id)?`<span class="badge skipped">${t("skipped")}</span>`:"",
    speaking?`<span class="badge speaking">${isPaused?t("pausedBadge"):t("playingNow")}</span>`:""
  ].join("");

  const seekBar=speaking?`
    <div style="margin-top:10px;">
      <input type="range" id="seek" min="0" max="${Math.max(0,speechQueue.length-1)}"
        value="${Math.max(0,speechIdx-1)}"
        oninput="seekPreview(this.value)" onchange="seekTo(this.value)">
      <div class="hint" style="display:flex; justify-content:space-between; margin-top:0;">
        <span>${t("seekStart")}</span>
        <span id="seekPct">${Math.round(speechIdx/Math.max(1,speechQueue.length)*100)} %</span>
        <span>${t("seekEnd")}</span>
      </div>
    </div>`:"";

  document.getElementById("currentStopContainer").innerHTML=`
  <div class="card">
    <div class="stop-head">
      <div class="stop-num ${done?"done":""}">${s.id+1}</div>
      <h2 class="stop-title">${L8(s.name)}</h2>
    </div>
    <div class="badges">${badges}</div>
    <p class="intro">${L8(s.intro)}</p>

    <div class="btn-row">
      <button class="btn-terra ${arrived&&!speaking&&!done?"pulse":""}" onclick="playStop(${s.id})">${t("play")}</button>
      <button onclick="pauseSpeech()" ${speaking?"":"disabled"}>${isPaused?t("resume"):t("pause")}</button>
      <button onclick="stopSpeech()" ${speaking?"":"disabled"}>${t("stop")}</button>
    </div>
    ${seekBar}

    <details class="story-box" id="storyBox" ${storyOpen?"open":""}>
      <summary>${t("readStory")}</summary>
      <div class="story">${storyToParagraphs(L8(s.story))}</div>
    </details>

    <div class="lookfor">
      <h3>${t("lookFor")}</h3>
      <ul>${L8(s.lookFor).map(x=>`<li>${x}</li>`).join("")}</ul>
    </div>

    ${s.walkMin?`<p class="hint" style="margin-top:12px;">${tf("walkNext",{m:s.walkMin})}</p>`:""}
    ${mapsLinks(s)}

    <div class="btn-row">
      <button onclick="gotoStop(${s.id-1})" ${s.id===0?"disabled":""}>${t("prev")}</button>
      <button onclick="gotoStop(${s.id+1})" ${s.id===STOPS.length-1?"disabled":""}>${t("nextBtn")}</button>
    </div>
    <div class="btn-row">
      <button class="btn-primary" onclick="markDone(${s.id})" ${done?"disabled":""}>${t("markDone")}</button>
      <button onclick="skipStop(${s.id})" ${done||isSkipped(s.id)?"disabled":""}>${t("skip")}</button>
    </div>
  </div>`;
  const box=document.getElementById("storyBox");
  if(box) box.addEventListener("toggle",()=>{ storyOpen=box.open; });
}
function renderAllStops(){
  document.getElementById("routeSummary").textContent=L8(TOURS[state.tour].summary);
  document.getElementById("allStopsContainer").innerHTML=STOPS.map(s=>{
    const d=userPos?fmtDist(distMeters(userPos.lat,userPos.lng,s.lat,s.lng)):null;
    const status=isDone(s.id)?"✅":isSkipped(s.id)?"⏭":s.id===prog().current?"📍":"○";
    const tail=s.walkMin?tf("minToNext",{m:s.walkMin}):t("endsHere");
    return `<button class="stop-row card" style="padding:14px;" onclick="openStopFromMap(${s.id})">
      <div class="stop-num ${isDone(s.id)?"done":""}" style="width:38px;height:38px;font-size:1.05rem;">${s.id+1}</div>
      <div class="grow">
        <div class="name">${L8(s.name)}</div>
        <div class="meta">${status} ${d?tf("fromHere",{d:d})+" · ":""}${tail}</div>
      </div>
      <div class="chev">›</div>
    </button>`;
  }).join("");
}
function renderHeader(){
  const p=prog();
  const doneCount=p.completed.length;
  const pct=Math.round(doneCount/STOPS.length*100);
  document.getElementById("progressFill").style.width=pct+"%";
  document.getElementById("hdrDone").textContent=`${doneCount} ${t("ofStops")}`;
  document.getElementById("hdrPct").textContent=pct+" %";
  const cur=STOPS[p.current];
  document.getElementById("hdrCurrent").textContent=t("now")+": "+(cur?`${cur.id+1}. ${L8(cur.name)}`:"–");
  const nxt=STOPS[p.current+1];
  document.getElementById("hdrNext").textContent=t("next")+": "+(nxt?`${nxt.id+1}. ${L8(nxt.name)}`:t("goal"));
  let rem=0;
  for(let i=p.current;i<STOPS.length-1;i++){
    rem+=distMeters(STOPS[i].lat,STOPS[i].lng,STOPS[i+1].lat,STOPS[i+1].lng);
  }
  document.getElementById("hdrRemaining").textContent=t("approx")+" "+fmtDist(rem*1.25)+" "+t("left");
}
function updateDistances(){
  const nxt=nextOpenStop();
  const info=document.getElementById("mapInfo");
  if(userPos&&nxt){
    info.textContent=`${t("nextStopInfo")}: ${nxt.id+1}. ${L8(nxt.name)} · ${fmtDist(distMeters(userPos.lat,userPos.lng,nxt.lat,nxt.lng))}`;
  }else if(!nxt){ info.textContent=t("allDoneInfo"); }
  else if(!userPos){ info.textContent=t("waitingGps"); }
  renderHeader();
  if(document.getElementById("view-all").classList.contains("active")) renderAllStops();
  if(document.getElementById("view-current").classList.contains("active") && !seekDragging) renderCurrentStop();
}
function renderAll(){ renderHeader(); renderCurrentStop(); renderAllStops(); refreshMarkers(); }

/* ============================================================
   11) VISNINGSSKIFT + kortstørrelse
   ============================================================ */
function sizeMap(){
  const mapEl=document.getElementById("map");
  if(!mapEl) return;
  const header=document.querySelector("header");
  const nav=document.querySelector("nav");
  const vh=(window.visualViewport&&window.visualViewport.height)||window.innerHeight;
  const h=Math.max(300, vh - header.offsetHeight - nav.offsetHeight);
  mapEl.style.height=h+"px";
  if(map) map.invalidateSize();
}
window.addEventListener("resize",sizeMap);
window.addEventListener("orientationchange",()=>setTimeout(sizeMap,250));
if(window.visualViewport) window.visualViewport.addEventListener("resize",sizeMap);

function showView(id){
  document.querySelectorAll(".view").forEach(v=>v.classList.toggle("active",v.id===id));
  document.querySelectorAll("nav button").forEach(b=>b.classList.toggle("active",b.dataset.view===id));
  if(id==="view-map"){ setTimeout(sizeMap,120); }
}
document.querySelectorAll("nav button").forEach(b=>b.addEventListener("click",()=>showView(b.dataset.view)));

/* ============================================================
   12) KOMPAS
   ============================================================ */
function handleOrientation(e){
  let heading=null;
  if(typeof e.webkitCompassHeading==="number"){ heading=e.webkitCompassHeading; }
  else if(typeof e.alpha==="number"){ heading=360-e.alpha; }
  if(heading==null) return;
  document.getElementById("compass").style.display="flex";
  document.getElementById("compassNeedle").style.transform=`rotate(${-heading}deg)`;
}
document.getElementById("btnCompassPerm").addEventListener("click",async()=>{
  try{
    if(typeof DeviceOrientationEvent!=="undefined"&&typeof DeviceOrientationEvent.requestPermission==="function"){
      const res=await DeviceOrientationEvent.requestPermission();
      if(res!=="granted"){ toast(t("compassDenied")); return; }
    }
    window.addEventListener("deviceorientation",handleOrientation);
    toast(t("compassOn")); showView("view-map");
  }catch(e){ toast(t("compassNa")); }
});

/* ============================================================
   13) KORTKNAPPER OG INDSTILLINGER
   ============================================================ */
document.getElementById("btnMyPos").addEventListener("click",()=>{
  if(map&&userPos){ map.setView([userPos.lat,userPos.lng],17); }
  else{ toast(t("noPosYet")); }
});
document.getElementById("btnNextStop").addEventListener("click",()=>{
  const nxt=nextOpenStop();
  if(map&&nxt){ map.setView([nxt.lat,nxt.lng],17); stopMarkers[nxt.id].openPopup(); }
  else if(!nxt){ toast(t("allDoneInfo")); }
});
document.getElementById("btnReset").addEventListener("click",resetTour);
document.getElementById("btnResetApp").addEventListener("click",resetApp);

const rateEl=document.getElementById("rate"), volEl=document.getElementById("volume");
rateEl.addEventListener("input",()=>{
  state.rate=parseFloat(rateEl.value); saveState();
  document.getElementById("rateVal").textContent=state.rate.toFixed(1).replace(".",state.lang==="da"?",":".")+"×";
});
volEl.addEventListener("input",()=>{
  state.volume=parseFloat(volEl.value); saveState();
  document.getElementById("volVal").textContent=Math.round(state.volume*100)+" %";
});

/* ============================================================
   14) OFFLINE (service worker + download af kortfliser)
   ============================================================ */
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("./sw.js").catch(()=>{});
}
function lon2tile(lng,z){ return Math.floor((lng+180)/360*Math.pow(2,z)); }
function lat2tile(lat,z){ const r=lat*Math.PI/180;
  return Math.floor((1-Math.log(Math.tan(r)+1/Math.cos(r))/Math.PI)/2*Math.pow(2,z)); }

async function downloadOffline(){
  const btn=document.getElementById("btnOffline");
  if(!("caches" in window)){ toast(t("offlineNoSw")); return; }
  const lats=STOPS.map(s=>s.lat), lngs=STOPS.map(s=>s.lng), pad=0.004;
  const minLat=Math.min(...lats)-pad, maxLat=Math.max(...lats)+pad;
  const minLng=Math.min(...lngs)-pad, maxLng=Math.max(...lngs)+pad;
  const urls=[];
  [14,15,16,17,18].forEach(z=>{
    const x1=lon2tile(minLng,z), x2=lon2tile(maxLng,z);
    const y1=lat2tile(maxLat,z), y2=lat2tile(minLat,z);
    for(let x=x1;x<=x2;x++) for(let y=y1;y<=y2;y++)
      urls.push(`https://tile.openstreetmap.org/${z}/${x}/${y}.png`);
  });
  btn.disabled=true;
  let done=0, failed=0;
  try{
    const cache=await caches.open("trieste-tiles-v1");
    for(let i=0;i<urls.length;i+=6){
      await Promise.all(urls.slice(i,i+6).map(async u=>{
        try{
          if(await cache.match(u)){ done++; return; }
          const res=await fetch(u,{mode:"no-cors"});
          await cache.put(u,res); done++;
        }catch(e){ failed++; }
      }));
      btn.textContent=tf("btnOfflineBusy",{p:Math.round((done+failed)/urls.length*100)});
    }
  }catch(e){ failed++; }
  btn.disabled=false; btn.textContent=t("btnOffline");
  if(failed>urls.length*0.1){ toast(t("offlineFail")); }
  else{
    prog().offlineReady=true; saveState();
    document.getElementById("offlineInfo").textContent=t("offlineHint")+" "+t("offlineDone");
    toast(t("offlineDone"));
  }
}
document.getElementById("btnOffline").addEventListener("click",downloadOffline);

// Fornyer kortfliserne: rydder flise-cachen og henter den valgte bys kort forfra
async function refreshTiles(){
  if(!("caches" in window)){ toast(t("offlineNoSw")); return; }
  if(!confirm(t("refreshTilesConfirm"))) return;
  try{ await caches.delete("trieste-tiles-v1"); }catch(e){}
  Object.keys(state.tours).forEach(k=>{ state.tours[k].offlineReady=false; });
  saveState();
  downloadOffline();
}
document.getElementById("btnRefreshTiles").addEventListener("click",refreshTiles);

/* ============================================================
   15) OPSTART
   Byvalget huskes; første gang vises byvælgeren.
   ============================================================ */
loadState();
if(!state.tour){
  state.tour="trieste";           // midlertidigt, så appen kan tegnes bag overlayet
  pendingChoice=true;
  document.getElementById("tourPicker").style.display="block";
}
ensureProg(state.tour);
STOPS=TOURS[state.tour].stops;
rateEl.value=state.rate; volEl.value=state.volume;
document.getElementById("rateVal").textContent=state.rate.toFixed(1).replace(".",state.lang==="da"?",":".")+"×";
document.getElementById("volVal").textContent=Math.round(state.volume*100)+" %";
initMap();
sizeMap(); setTimeout(sizeMap,300);
applyLanguage();
startGeolocation();
pickVoice();
renderAll();
</script>
